<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sudoku Mini App - Telegram WebApp</title>
    
    <!-- Google Fonts Imports -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet">

    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            }
          }
        }
      }
    </script>

    <!-- Custom Style Sheet Override -->
    <link rel="stylesheet" href="/styles.css">

    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body class="relative min-h-screen w-full flex flex-col justify-between overflow-x-hidden transition-colors duration-300 select-none">
    
    <!-- Absolute Ambient Pulsing Blur Background elements -->
    <div class="sudoku-glow top-[-80px] left-[-80px] bg-blue-500/20" style="animation-delay: 0s;"></div>
    <div class="sudoku-glow bottom-[-80px] right-[-80px] bg-sky-500/20" style="animation-delay: 4s;"></div>

    <!-- Active Screen Wrapper Centered Container -->
    <div class="relative z-10 w-full max-w-md mx-auto flex-1 flex flex-col p-4">
      
      <!-- TOP NAVIGATION BAR STATUS -->
      <header class="flex items-center justify-between py-2 mb-4 w-full">
        <!-- Back action or Default Emblem -->
        <div id="nav-left-bar" class="flex-1 mr-4">
          <div class="flex items-center gap-2.5">
            <div class="w-9 h-9 rounded-xl bg-gradient-to-tr from-blue-600 to-sky-400 flex items-center justify-center text-white font-display font-extrabold text-xl shadow-lg shadow-blue-500/20">
              S
            </div>
            <span class="text-2xl font-display font-bold bg-gradient-to-r from-blue-500 to-sky-400 bg-clip-text text-transparent" data-trans="title">
              Sudoku
            </span>
          </div>
        </div>

        <!-- Settings Button -->
        <button onclick="toggleSettings(true)" id="btn-nav-settings" class="p-2.5 rounded-xl border transition-smooth bg-white/5 dark:bg-white/5 border-slate-200/50 dark:border-white/10 text-slate-705 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-white/10 shadow-[0_4px_12px_rgba(0,0,0,0.03)]" aria-label="Open Settings">
          <i data-lucide="settings" class="w-[18px] h-[18px]"></i>
        </button>
      </header>

      <!-- MAIN LAYOUT SCREEN PANEL -->
      <main class="flex-1 flex flex-col justify-center w-full">
        
        <!-- ==================== SCREEN 1: HOME PAGE ==================== -->
        <section id="home-screen" class="space-y-8 py-4 flex flex-col items-center justify-center my-auto w-full transition-smooth">
          <!-- Logo Display Grid -->
          <div class="text-center space-y-2">
            <div class="inline-flex relative mb-2">
              <div class="grid grid-cols-2 gap-1 p-2 border-2 border-blue-500/80 rounded-2xl w-16 h-16 items-center justify-center bg-blue-500/5">
                <span class="text-blue-500 font-mono text-center text-lg font-bold">5</span>
                <span class="text-sky-400 font-mono text-center text-lg font-medium">3</span>
                <span class="text-sky-400 font-mono text-center text-lg font-medium">9</span>
                <span class="text-blue-500 font-mono text-center text-lg font-bold">7</span>
              </div>
            </div>
            <h1 class="text-4xl font-display font-black tracking-tight bg-gradient-to-r from-blue-500 to-sky-400 bg-clip-text text-transparent" data-trans="title">
              Sudoku
            </h1>
            <p class="text-xs text-slate-400 font-mono tracking-wide" data-trans="selectDifficulty">
              Choose Difficulty
            </p>
          </div>

          <!-- Difficulty choices render grid -->
          <div id="difficulty-options" class="w-full space-y-3 max-w-[320px]">
             <!-- Populated dynamically in app.js -->
          </div>
        </section>

        <!-- ==================== SCREEN 2: GAMEPLAY GAME ==================== -->
        <section id="game-screen" class="space-y-4 my-auto flex flex-col items-center w-full transition-smooth hidden">
          <!-- Statistics board counts row -->
          <div class="w-full max-w-[420px] flex items-center justify-between px-1.5 text-xs font-mono text-slate-400 font-semibold select-none">
            <!-- Clock Timer counter -->
            <div id="timer-container" class="flex items-center gap-1.5 px-3 py-2 rounded-xl border">
              <i data-lucide="clock" class="w-[13px] h-[13px] text-sky-400"></i>
              <span data-trans="timer">Time</span>:
              <span id="timer-value" class="font-bold text-slate-800 dark:text-slate-100">00:00</span>
            </div>

            <!-- Mistakes warning tracker counter -->
            <div id="mistakes-container" class="flex items-center gap-1.5 px-3 py-2 rounded-xl border transition-smooth">
              <i data-lucide="alert-triangle" class="w-[13px] h-[13px]"></i>
              <span data-trans="mistakes">Mistakes</span>:
              <span id="mistakes-count" class="font-bold">0</span>
            </div>
          </div>

          <!-- Interactive Board layout visual -->
          <div id="sudoku-board-container" class="w-full max-w-[420px] aspect-square rounded-2xl p-1 shadow-2xl overflow-hidden transition-smooth relative">
            <!-- 3x3 Block demarcation guidelines overlay -->
            <div class="absolute inset-0 pointer-events-none z-10 lines-overlay">
              <div class="absolute left-1/3 w-[2.5px] h-full -ml-[1.25px]"></div>
              <div class="absolute left-2/3 w-[2.5px] h-full -ml-[1.25px]"></div>
              <div class="absolute top-1/3 h-[2.5px] w-full -mt-[1.25px]"></div>
              <div class="absolute top-2/3 h-[2.5px] w-full -mt-[1.25px]"></div>
            </div>

            <!-- 9x9 cellular grids panel -->
            <div id="sudoku-cells-grid" class="grid grid-cols-9 h-full w-full relative z-0">
               <!-- Populated dynamically in app.js -->
            </div>
          </div>

          <!-- Quick Actions controller restart -->
          <div class="flex items-center justify-center gap-4 py-1 select-none">
            <button onclick="restartPuzzle()" id="btn-action-restart" class="flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-semibold border transition-smooth">
              <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
              <span data-trans="restart">Restart</span>
            </button>
          </div>

          <!-- Input numeric Numpad controller row -->
          <div class="w-full max-w-[420px] mx-auto space-y-3 px-1 select-none">
            
            <!-- Numbers button rows -->
            <div class="grid grid-cols-9 gap-1.5 justify-center">
              <button onclick="inputDigit(1)" id="numpad-btn-1" class="numpad-btn aspect-square rounded-xl text-xl sm:text-2xl font-mono font-bold flex items-center justify-center transition-smooth">1</button>
              <button onclick="inputDigit(2)" id="numpad-btn-2" class="numpad-btn aspect-square rounded-xl text-xl sm:text-2xl font-mono font-bold flex items-center justify-center transition-smooth">2</button>
              <button onclick="inputDigit(3)" id="numpad-btn-3" class="numpad-btn aspect-square rounded-xl text-xl sm:text-2xl font-mono font-bold flex items-center justify-center transition-smooth">3</button>
              <button onclick="inputDigit(4)" id="numpad-btn-4" class="numpad-btn aspect-square rounded-xl text-xl sm:text-2xl font-mono font-bold flex items-center justify-center transition-smooth">4</button>
              <button onclick="inputDigit(5)" id="numpad-btn-5" class="numpad-btn aspect-square rounded-xl text-xl sm:text-2xl font-mono font-bold flex items-center justify-center transition-smooth">5</button>
              <button onclick="inputDigit(6)" id="numpad-btn-6" class="numpad-btn aspect-square rounded-xl text-xl sm:text-2xl font-mono font-bold flex items-center justify-center transition-smooth">6</button>
              <button onclick="inputDigit(7)" id="numpad-btn-7" class="numpad-btn aspect-square rounded-xl text-xl sm:text-2xl font-mono font-bold flex items-center justify-center transition-smooth">7</button>
              <button onclick="inputDigit(8)" id="numpad-btn-8" class="numpad-btn aspect-square rounded-xl text-xl sm:text-2xl font-mono font-bold flex items-center justify-center transition-smooth">8</button>
              <button onclick="inputDigit(9)" id="numpad-btn-9" class="numpad-btn aspect-square rounded-xl text-xl sm:text-2xl font-mono font-bold flex items-center justify-center transition-smooth">9</button>
            </div>

            <!-- Erase option row button -->
            <div class="flex justify-center">
              <button onclick="eraseCell()" id="numpad-btn-erase" class="numpad-btn flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold transition-smooth w-full max-w-[200px] border">
                <i data-lucide="delete" class="w-4 h-4"></i>
                <span data-trans="erase">Erase</span>
              </button>
            </div>
          </div>
        </section>

      </main>
    </div>

    <!-- ==================== OVERLAY 1: SETTINGS PANEL SCREEN ==================== -->
    <div id="settings-screen" class="absolute inset-0 z-40 flex flex-col p-6 overflow-y-auto slide-enter hidden">
      <!-- Settings Header slider panel -->
      <div class="flex items-center justify-between mb-8">
        <h2 class="text-2xl font-display font-bold flex items-center gap-2" data-trans="settings">
          Settings
        </h2>
        <button onclick="toggleSettings(false)" id="btn-settings-close" class="p-2 rounded-full border transition-colors bg-white/5 dark:bg-white/5 border-slate-200 hover:bg-slate-200 dark:border-white/10 dark:hover:bg-white/10 text-slate-600 dark:text-slate-300" aria-label="Close Settings">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>

      <!-- Config sliders lists -->
      <div class="space-y-8 flex-1">
        <!-- Language Selection row -->
        <div class="space-y-3">
          <label class="text-xs font-mono uppercase tracking-wider text-slate-400 flex items-center gap-1.5 font-semibold">
            <i data-lucide="globe" class="w-3.5 h-3.5"></i> 
            <span data-trans="language">Language</span>
          </label>
          <div class="grid grid-cols-1 gap-2.5">
            <button onclick="updateLanguage('en')" class="lang-select-btn flex items-center justify-between px-4 py-3.5 rounded-xl border text-left transition-smooth w-full" data-lang="en">
              <div>
                <span class="text-sm font-semibold">English</span>
                <span class="text-xs text-slate-400 block mt-0.5">English</span>
              </div>
              <div class="checked-mark hidden text-blue-600 dark:text-sky-400">
                <i data-lucide="check" class="w-[18px] h-[18px]"></i>
              </div>
            </button>

            <button onclick="updateLanguage('ru')" class="lang-select-btn flex items-center justify-between px-4 py-3.5 rounded-xl border text-left transition-smooth w-full" data-lang="ru">
              <div>
                <span class="text-sm font-semibold">Русский</span>
                <span class="text-xs text-slate-400 block mt-0.5">Russian</span>
              </div>
              <div class="checked-mark hidden text-blue-600 dark:text-sky-400">
                <i data-lucide="check" class="w-[18px] h-[18px]"></i>
              </div>
            </button>

            <button onclick="updateLanguage('uz')" class="lang-select-btn flex items-center justify-between px-4 py-3.5 rounded-xl border text-left transition-smooth w-full" data-lang="uz">
              <div>
                <span class="text-sm font-semibold">O'zbekcha</span>
                <span class="text-xs text-slate-400 block mt-0.5">Uzbek</span>
              </div>
              <div class="checked-mark hidden text-blue-600 dark:text-sky-400">
                <i data-lucide="check" class="w-[18px] h-[18px]"></i>
              </div>
            </button>
          </div>
        </div>

        <!-- Light/Dark Custom Theme Select Toggle -->
        <div class="space-y-3">
          <label class="text-xs font-mono uppercase tracking-wider text-slate-400 flex items-center gap-1.5 font-semibold">
            <i data-lucide="sun" class="w-3.5 h-3.5"></i>
            <span data-trans="theme">Theme</span>
          </label>
          <div class="grid grid-cols-2 gap-3">
            <button onclick="state.theme = 'light'; updateTheme();" id="btn-theme-light" class="flex flex-col items-center justify-center p-4 rounded-xl border gap-2 transition-all duration-200">
              <i data-lucide="sun" class="w-5 h-5"></i>
              <span class="text-xs font-semibold" data-trans="lightTheme">Light</span>
            </button>

            <button onclick="state.theme = 'dark'; updateTheme();" id="btn-theme-dark" class="flex flex-col items-center justify-center p-4 rounded-xl border gap-2 transition-all duration-200">
              <i data-lucide="moon" class="w-5 h-5"></i>
              <span class="text-xs font-semibold" data-trans="darkTheme">Dark</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Settings footer credentials info -->
      <div class="mt-auto pt-6 text-center border-t border-dashed border-slate-700/20">
        <p class="text-[10px] font-mono text-slate-400">
          Sudoku Telegram Mini App v1.0.0
        </p>
      </div>
    </div>

    <!-- ==================== OVERLAY 2: COMPLETION MODAL WINDOW ==================== -->
    <div id="completion-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-md hidden">
      <div class="w-full max-w-sm rounded-3xl p-6 text-center shadow-3xl relative overflow-hidden glass-panel-dark dark:text-slate-100 text-slate-800 scale-enter">
        
        <!-- Trophy bounce illustrations badge -->
        <div class="relative inline-flex items-center justify-center p-5 bg-amber-500/10 rounded-full text-amber-500 mb-4">
          <div id="modal-trophy-icon" class="animate-bounce">
            <i data-lucide="trophy" class="w-12 h-12"></i>
          </div>
          <!-- New best score badge notification -->
          <span id="modal-trophy-badge" class="absolute -top-1 -right-1 bg-red-500 text-white p-1 rounded-full text-[10px] font-bold uppercase tracking-wider scale-110 shadow-lg border-2 border-slate-950 hidden">
            <i data-lucide="award" class="w-[18px] h-[18px]"></i>
          </span>
        </div>

        <!-- Dialog header victory notes -->
        <h3 class="text-3xl font-display font-bold tracking-tight mb-1 text-amber-500" data-trans="completedTitle">
          Completed!
        </h3>
        <p id="completed-difficulty-label" class="text-xs font-mono uppercase tracking-wider text-slate-400 mb-6">
          Easy
        </p>

        <!-- Dynamic Statistics record panel grids -->
        <div class="grid grid-cols-2 gap-3 mb-6">
          <!-- Time spent -->
          <div class="p-4 rounded-2xl flex flex-col items-center justify-center border bg-white/5 dark:bg-white/5 border-slate-200/50 dark:border-white/5">
            <span class="text-[10px] font-mono uppercase tracking-wider text-slate-400 mb-1" data-trans="timeSpent">
              Time Spent
            </span>
            <span id="modal-time-spent" class="text-2xl font-mono font-bold text-sky-450 text-sky-400">
              00:00
            </span>
          </div>

          <!-- Best records time tracking -->
          <div class="p-4 rounded-2xl flex flex-col items-center justify-center border bg-white/5 dark:bg-white/5 border-slate-200/50 dark:border-white/5">
            <span class="text-[10px] font-mono uppercase tracking-wider text-slate-400 mb-1" data-trans="bestTime">
              Best Record
            </span>
            <span id="modal-best-time" class="text-2xl font-mono font-bold text-emerald-400">
              00:00
            </span>
          </div>
        </div>

        <div id="modal-record-badge" class="mb-6 p-2 rounded-xl bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-xs font-semibold hidden">
          ✨ New Best Time Record! ✨
        </div>

        <!-- Overlay Action game control buttons -->
        <div class="flex flex-col gap-2.5">
          <button onclick="modalNewGame()" id="btn-modal-newgame" class="w-full py-3.5 rounded-xl font-bold text-sm tracking-wide shadow-md transition-colors bg-blue-600 hover:bg-blue-700 text-white dark:bg-sky-500 dark:hover:bg-sky-400 dark:text-slate-950" data-trans="newGame">
            New Game
          </button>

          <button onclick="modalMainMenu()" id="btn-modal-mainmenu" class="w-full py-3.5 rounded-xl font-semibold text-sm tracking-wide border transition-smooth flex items-center justify-center gap-2 bg-slate-100 hover:bg-slate-200 dark:bg-white/5 dark:border-white/10 dark:text-slate-300 dark:hover:bg-white/10 text-slate-600">
            <i data-lucide="home" class="w-4 h-4"></i>
            <span data-trans="mainMenu">Main Menu</span>
          </button>
        </div>

      </div>
    </div>

    <!-- Load Vanilla script at footer page to allow async load parsing -->
    <script src="/app.js"></script>
  </body>
</html>
